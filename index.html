<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Повітряна обстановка</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
<style>
  :root{
    --bg:#000;
    --panel:rgba(28,28,30,.62);
    --panel-solid:rgba(28,28,30,.92);
    --hair:rgba(84,84,88,.55);
    --label:#fff;
    --label2:rgba(235,235,245,.6);
    --label3:rgba(235,235,245,.32);
    --red:#FF453A; --orange:#FF9F0A; --yellow:#FFD60A; --teal:#64D2FF;
    --green:#30D158; --blue:#0A84FF;
    --r:14px;
    font-synthesis:none;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:var(--bg);overflow:hidden;
    font-family:-apple-system,"SF Pro Display","SF Pro Text",system-ui,"Helvetica Neue",sans-serif;
    color:var(--label);-webkit-user-select:none;user-select:none;}
  #map{position:absolute;inset:0;}
  canvas{outline:none;}

  /* ---- спільні «скляні» панелі (Apple vibrancy) ---- */
  .glass{background:var(--panel);-webkit-backdrop-filter:blur(22px) saturate(160%);
    backdrop-filter:blur(22px) saturate(160%);border:.5px solid var(--hair);
    border-radius:var(--r);box-shadow:0 8px 30px rgba(0,0,0,.5);}
  .lite .glass{background:var(--panel-solid);-webkit-backdrop-filter:none;backdrop-filter:none;}

  /* ---- верхній дашборд ---- */
  #dash{position:absolute;left:max(10px,env(safe-area-inset-left));
    right:max(10px,env(safe-area-inset-right));top:max(10px,env(safe-area-inset-top));
    padding:10px 12px;z-index:5;transition:transform .28s cubic-bezier(.32,.72,0,1);}
  #dashHead{display:flex;align-items:center;gap:8px;cursor:pointer;}
  #dashTitle{font-size:13px;font-weight:600;letter-spacing:.2px;}
  #dashLive{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:11px;color:var(--label2);}
  #dashLive .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 1.6s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  #chev{color:var(--label3);font-size:12px;transition:transform .28s;}
  #dash.collapsed #dashBody{height:0;opacity:0;margin-top:0;pointer-events:none;}
  #dash.collapsed #chev{transform:rotate(-90deg);}
  #dashBody{overflow:hidden;transition:height .28s cubic-bezier(.32,.72,0,1),opacity .2s,margin-top .28s;margin-top:10px;}
  .stats{display:flex;gap:8px;}
  .stat{flex:1;background:rgba(118,118,128,.18);border-radius:10px;padding:7px 9px;}
  .stat .n{font-size:20px;font-weight:650;line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-.5px;}
  .stat .l{font-size:10px;color:var(--label2);margin-top:3px;font-weight:500;}
  .types{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap;}
  .chip{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--label2);
    background:rgba(118,118,128,.16);padding:4px 8px;border-radius:8px;font-variant-numeric:tabular-nums;}
  .chip .sw{width:8px;height:8px;border-radius:2px;}
  #spark{margin-top:10px;width:100%;height:42px;display:block;}
  #sparkLbl{font-size:10px;color:var(--label3);margin-top:2px;}

  /* ---- нижній док керування ---- */
  #dock{position:absolute;left:50%;transform:translateX(-50%);
    bottom:max(12px,env(safe-area-inset-bottom));z-index:6;
    display:flex;gap:6px;padding:7px;max-width:calc(100vw - 16px);overflow-x:auto;
    scrollbar-width:none;}
  #dock::-webkit-scrollbar{display:none;}
  .btn{flex:0 0 auto;width:54px;height:54px;border-radius:12px;border:none;
    background:rgba(118,118,128,.2);color:var(--label);display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:3px;font-size:9px;font-weight:500;
    cursor:pointer;transition:background .15s,transform .1s;}
  .btn:active{transform:scale(.92);background:rgba(118,118,128,.4);}
  .btn.on{background:var(--blue);color:#fff;}
  .btn svg{width:21px;height:21px;}
  .btn .lbl{white-space:nowrap;}

  /* ---- popover (шари / фільтр) ---- */
  .pop{position:absolute;bottom:calc(78px + env(safe-area-inset-bottom));left:50%;
    transform:translateX(-50%) translateY(8px);z-index:7;padding:8px;min-width:210px;
    opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;}
  .pop.show{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0);}
  .row{display:flex;align-items:center;gap:10px;padding:9px 8px;border-radius:9px;cursor:pointer;}
  .row:active{background:rgba(118,118,128,.2);}
  .row .sw{width:10px;height:10px;border-radius:3px;flex:0 0 auto;}
  .row .nm{font-size:14px;flex:1;}
  .row .tg{width:42px;height:25px;border-radius:13px;background:rgba(120,120,128,.32);
    position:relative;transition:background .2s;flex:0 0 auto;}
  .row .tg::after{content:"";position:absolute;top:2px;left:2px;width:21px;height:21px;
    border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.4);}
  .row.on .tg{background:var(--green);}
  .row.on .tg::after{transform:translateX(17px);}
  .pop .sep{height:.5px;background:var(--hair);margin:4px 6px;}
  .pop h4{font-size:11px;color:var(--label2);font-weight:600;margin:6px 8px 2px;text-transform:uppercase;letter-spacing:.4px;}

  /* ---- bottom sheet (деталі об'єкта) ---- */
  #sheet{position:absolute;left:0;right:0;bottom:0;z-index:9;
    transform:translateY(110%);transition:transform .34s cubic-bezier(.32,.72,0,1);
    border-radius:20px 20px 0 0;padding:8px 18px calc(20px + env(safe-area-inset-bottom));}
  #sheet.show{transform:translateY(0);}
  #grab{width:38px;height:5px;border-radius:3px;background:var(--label3);margin:4px auto 12px;}
  #sheetHead{display:flex;align-items:center;gap:11px;margin-bottom:14px;}
  #sheetIcon{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;}
  #sheetIcon svg{width:24px;height:24px;}
  #sheetType{font-size:18px;font-weight:650;letter-spacing:-.3px;}
  #sheetSub{font-size:12px;color:var(--label2);margin-top:1px;}
  #sheetStatus{margin-left:auto;font-size:11px;font-weight:600;padding:5px 10px;border-radius:20px;}
  .metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .metric{background:rgba(118,118,128,.16);border-radius:12px;padding:11px 13px;}
  .metric .l{font-size:11px;color:var(--label2);}
  .metric .v{font-size:20px;font-weight:600;margin-top:3px;font-variant-numeric:tabular-nums;letter-spacing:-.4px;}
  .metric .v small{font-size:12px;color:var(--label2);font-weight:500;}

  #toast{position:absolute;left:50%;transform:translateX(-50%) translateY(-12px);
    bottom:calc(86px + env(safe-area-inset-bottom));z-index:8;padding:9px 16px;border-radius:20px;
    font-size:13px;font-weight:500;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;white-space:nowrap;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  #boot{position:absolute;inset:0;z-index:20;background:#000;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:14px;transition:opacity .5s;}
  #boot.hide{opacity:0;pointer-events:none;}
  #boot .ring{width:34px;height:34px;border-radius:50%;border:2.5px solid rgba(255,255,255,.15);
    border-top-color:var(--blue);animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  #boot .t{font-size:13px;color:var(--label2);}
  .maplibregl-ctrl-attrib{font-size:9px!important;background:rgba(0,0,0,.4)!important;}
  .maplibregl-ctrl-attrib a{color:rgba(255,255,255,.5)!important;}
</style>
</head>
<body>
<div id="map"></div>

<!-- Дашборд -->
<div id="dash" class="glass">
  <div id="dashHead">
    <div id="dashTitle" data-i18n="title">Повітряна обстановка</div>
    <div id="dashLive"><span class="dot"></span><span data-i18n="live">наживо</span></div>
    <span id="chev">▾</span>
  </div>
  <div id="dashBody">
    <div class="stats">
      <div class="stat"><div class="n" id="sFlight" style="color:var(--orange)">0</div><div class="l" data-i18n="inflight">у польоті</div></div>
      <div class="stat"><div class="n" id="sDown" style="color:var(--green)">0</div><div class="l" data-i18n="down">збито</div></div>
      <div class="stat"><div class="n" id="sHit" style="color:var(--red)">0</div><div class="l" data-i18n="reached">долетіло</div></div>
    </div>
    <div class="types" id="typeChips"></div>
    <canvas id="spark"></canvas>
    <div id="sparkLbl" data-i18n="sparklbl">активність за останні 60 с</div>
  </div>
</div>

<!-- Popover: шари -->
<div id="popLayers" class="pop glass">
  <h4 data-i18n="layers">Шари</h4>
  <div class="row on" data-layer="terrain"><span class="nm" data-i18n="l_terrain">3D-рельєф</span><span class="tg"></span></div>
  <div class="row on" data-layer="buildings"><span class="nm" data-i18n="l_build">Будівлі (3D)</span><span class="tg"></span></div>
  <div class="row on" data-layer="alerts"><span class="nm" data-i18n="l_alerts">Тривоги по областях</span><span class="tg"></span></div>
  <div class="row on" data-layer="arcs"><span class="nm" data-i18n="l_arcs">Траєкторії</span><span class="tg"></span></div>
</div>

<!-- Popover: фільтр типів -->
<div id="popFilter" class="pop glass">
  <h4 data-i18n="filter">Типи загроз</h4>
  <div id="filterRows"></div>
</div>

<!-- Нижній док -->
<div id="dock" class="glass">
  <button class="btn" id="bView"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3 3 8l9 5 9-5-9-5Z"/><path d="M3 13l9 5 9-5"/></svg><span class="lbl" id="lblView">3D</span></button>
  <button class="btn" id="bLayers"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3 3 8l9 5 9-5-9-5Z"/><path d="m3 12 9 5 9-5"/><path d="m3 16 9 5 9-5"/></svg><span class="lbl" data-i18n="d_layers">Шари</span></button>
  <button class="btn" id="bFilter"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 5h18M6 12h12M10 19h4"/></svg><span class="lbl" data-i18n="d_filter">Фільтр</span></button>
  <button class="btn" id="bCenter"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg><span class="lbl" data-i18n="d_center">Центр</span></button>
  <button class="btn" id="bWave"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 5v14M5 12h14"/></svg><span class="lbl" data-i18n="d_wave">Хвиля</span></button>
  <button class="btn" id="bLite"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M13 2 4 14h6l-1 8 9-12h-6l1-8Z"/></svg><span class="lbl" data-i18n="d_lite">Лайт</span></button>
  <button class="btn" id="bLang"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a15 15 0 0 1 0 18M12 3a15 15 0 0 0 0 18"/></svg><span class="lbl" id="lblLang">EN</span></button>
</div>

<!-- Bottom sheet -->
<div id="sheet" class="glass">
  <div id="grab"></div>
  <div id="sheetHead">
    <div id="sheetIcon"></div>
    <div>
      <div id="sheetType">—</div>
      <div id="sheetSub">—</div>
    </div>
    <div id="sheetStatus">—</div>
  </div>
  <div class="metrics">
    <div class="metric"><div class="l" data-i18n="m_speed">Швидкість</div><div class="v" id="mSpeed">—</div></div>
    <div class="metric"><div class="l" data-i18n="m_alt">Висота</div><div class="v" id="mAlt">—</div></div>
    <div class="metric"><div class="l" data-i18n="m_eta">ETA до цілі</div><div class="v" id="mEta">—</div></div>
    <div class="metric"><div class="l" data-i18n="m_target">Ціль</div><div class="v" id="mTarget" style="font-size:16px">—</div></div>
  </div>
</div>

<div id="toast" class="glass"></div>

<div id="boot"><div class="ring"></div><div class="t" data-i18n="boot">Завантаження карти…</div></div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/deck.gl@9.0/dist.min.js"></script>
<script>
"use strict";
/* ====================== КОНФІГ / CONFIG ====================== */
const UA_BOUNDS = [[21.5, 43.3], [40.7, 52.6]];     // межі камери
const CENTER = [31.4, 48.9];
const DEM_URL = "https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png";
const STYLE = "https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json";

// Типи загроз: колір (Apple semantic), профіль руху, реалістичні підписи
const TYPES = {
  shahed:    {ua:"Shahed / БпЛА",      en:"Shahed / UAV",        color:[255,159,10],  rgb:"#FF9F0A", dur:[80,110], arc:1600, kmh:[160,200],  pkInt:.68, icon:"drone"},
  cruise:    {ua:"Крилата ракета",      en:"Cruise missile",      color:[255,214,10],  rgb:"#FFD60A", dur:[42,60],  arc:2600, kmh:[700,880],  pkInt:.46, icon:"rocket"},
  ballistic: {ua:"Балістика",           en:"Ballistic missile",   color:[255,69,58],   rgb:"#FF453A", dur:[18,30],  arc:9000, kmh:[3000,4200],pkInt:.18, icon:"ballistic"},
  recon:     {ua:"Розвідувальний БпЛА", en:"Recon UAV",           color:[100,210,255], rgb:"#64D2FF", dur:[95,130], arc:1200, kmh:[120,160], pkInt:.40, icon:"drone"},
};

// Цілі — реальні міста
const CITIES = [
  {ua:"Київ",en:"Kyiv",c:[30.52,50.45]},{ua:"Харків",en:"Kharkiv",c:[36.23,49.99]},
  {ua:"Одеса",en:"Odesa",c:[30.74,46.48]},{ua:"Дніпро",en:"Dnipro",c:[35.05,48.46]},
  {ua:"Львів",en:"Lviv",c:[24.03,49.84]},{ua:"Запоріжжя",en:"Zaporizhzhia",c:[35.14,47.84]},
  {ua:"Миколаїв",en:"Mykolaiv",c:[31.99,46.97]},{ua:"Кривий Ріг",en:"Kryvyi Rih",c:[33.39,47.91]},
  {ua:"Вінниця",en:"Vinnytsia",c:[28.47,49.23]},{ua:"Полтава",en:"Poltava",c:[34.55,49.59]},
  {ua:"Чернігів",en:"Chernihiv",c:[31.29,51.49]},{ua:"Суми",en:"Sumy",c:[34.80,50.91]},
  {ua:"Херсон",en:"Kherson",c:[32.62,46.64]},{ua:"Черкаси",en:"Cherkasy",c:[32.06,49.44]},
  {ua:"Житомир",en:"Zhytomyr",c:[28.66,50.25]},{ua:"Кропивницький",en:"Kropyvnytskyi",c:[32.26,48.51]},
];

// Точки старту (напрямки): північ (РБ), схід (РФ), південь (море/Крим)
const ORIGINS = [
  [28.0,52.4],[30.6,52.5],[32.0,52.3],            // північ
  [38.6,50.2],[40.2,49.2],[39.6,48.1],[38.2,47.4],// схід
  [31.4,44.4],[33.6,44.1],[36.0,44.9],[30.0,45.6] // південь
];

// Області для моку тривог (центроїди)
const OBLASTS = [
  {ua:"Київська",en:"Kyiv",c:[30.5,50.2]},{ua:"Харківська",en:"Kharkiv",c:[36.4,49.8]},
  {ua:"Одеська",en:"Odesa",c:[30.2,46.5]},{ua:"Дніпропетровська",en:"Dnipro",c:[34.5,48.4]},
  {ua:"Львівська",en:"Lviv",c:[24.0,49.7]},{ua:"Запорізька",en:"Zaporizhzhia",c:[35.3,47.5]},
  {ua:"Миколаївська",en:"Mykolaiv",c:[31.5,47.3]},{ua:"Полтавська",en:"Poltava",c:[34.0,49.6]},
  {ua:"Чернігівська",en:"Chernihiv",c:[31.8,51.5]},{ua:"Сумська",en:"Sumy",c:[34.3,51.0]},
  {ua:"Херсонська",en:"Kherson",c:[33.3,46.6]},{ua:"Вінницька",en:"Vinnytsia",c:[28.5,49.2]},
  {ua:"Житомирська",en:"Zhytomyr",c:[28.7,50.6]},{ua:"Полтавська",en:"Poltava2",c:[33.7,49.9]},
  {ua:"Донецька",en:"Donetsk",c:[37.5,48.1]},{ua:"Кіровоградська",en:"Kirovohrad",c:[32.3,48.4]},
];

/* ====================== I18N ====================== */
const I18N = {
  uk:{title:"Повітряна обстановка",live:"наживо",inflight:"у польоті",down:"збито",reached:"долетіло",
      sparklbl:"активність за останні 60 с",layers:"Шари",l_terrain:"3D-рельєф",l_build:"Будівлі (3D)",
      l_alerts:"Тривоги по областях",l_arcs:"Траєкторії",filter:"Типи загроз",d_layers:"Шари",d_filter:"Фільтр",
      d_center:"Центр",d_wave:"Хвиля",d_lite:"Лайт",m_speed:"Швидкість",m_alt:"Висота",m_eta:"ETA до цілі",
      m_target:"Ціль",boot:"Завантаження карти…",st_flight:"У ПОЛЬОТІ",st_int:"ЗБИТО",st_reach:"ДОЛЕТІЛО",
      wave:"Нова хвиля запущена",liteOn:"Лайт-режим увімкнено",liteOff:"Лайт-режим вимкнено"},
  en:{title:"Air Situation",live:"live",inflight:"in flight",down:"intercepted",reached:"reached",
      sparklbl:"activity, last 60 s",layers:"Layers",l_terrain:"3D terrain",l_build:"Buildings (3D)",
      l_alerts:"Oblast air alerts",l_arcs:"Trajectories",filter:"Threat types",d_layers:"Layers",d_filter:"Filter",
      d_center:"Center",d_wave:"Wave",d_lite:"Lite",m_speed:"Speed",m_alt:"Altitude",m_eta:"ETA to target",
      m_target:"Target",boot:"Loading map…",st_flight:"IN FLIGHT",st_int:"INTERCEPTED",st_reach:"REACHED",
      wave:"New wave launched",liteOn:"Lite mode on",liteOff:"Lite mode off"},
};
let lang = "uk";
const t = k => (I18N[lang][k] ?? k);
function applyI18n(){
  document.querySelectorAll("[data-i18n]").forEach(el=>{ el.textContent = t(el.getAttribute("data-i18n")); });
  buildTypeUI();
}

/* ====================== ДОПОМІЖНІ ====================== */
const rnd = (a,b)=>a+Math.random()*(b-a);
const lerp=(a,b,f)=>a+(b-a)*f;
const haptic = ms => { try{ if(navigator.vibrate) navigator.vibrate(ms); }catch(e){} }; // iOS Safari ігнорує — graceful

function toast(msg){
  const el=document.getElementById("toast"); el.textContent=msg; el.classList.add("show");
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove("show"),1800);
}

/* ====================== МАПА ====================== */
const map = new maplibregl.Map({
  container:"map", style:STYLE, center:CENTER, zoom:5.4, pitch:50, bearing:-8,
  maxBounds:UA_BOUNDS, minZoom:4.6, maxZoom:15, maxPitch:72,
  attributionControl:{compact:true}, dragRotate:true, pitchWithRotate:true,
});
map.touchZoomRotate.enableRotation();         // вільний rotate двома пальцями
map.touchPitch && map.touchPitch.enable();    // вільний tilt

const state = {
  is3D:true, lite:false,
  layersOn:{terrain:true,buildings:true,alerts:true,arcs:true},
  typeOn:{shahed:true,cruise:true,ballistic:true,recon:true},
  selectedId:null,
};

function findVectorSource(){
  const s=map.getStyle().sources||{};
  for(const id in s){ if(s[id].type==="vector") return id; }
  return null;
}
function firstSymbolLayer(){
  const ls=map.getStyle().layers||[];
  for(const l of ls){ if(l.type==="symbol") return l.id; }
  return undefined;
}

map.on("load", ()=>{
  // --- Terrain (безкоштовно, без ключа) ---
  try{
    map.addSource("dem",{type:"raster-dem",tiles:[DEM_URL],encoding:"terrarium",tileSize:256,maxzoom:13,
      attribution:"Terrain: Terrarium / AWS"});
    map.setTerrain({source:"dem",exaggeration:1.25});
    map.addLayer({id:"sky",type:"sky",paint:{"sky-type":"atmosphere","sky-atmosphere-sun-intensity":4,
      "sky-atmosphere-color":"rgba(10,14,24,1)"}});
  }catch(e){ console.warn("terrain",e); }

  // --- Екструдовані будівлі з CARTO-вектора (LOD: лише з zoom 13.5) ---
  try{
    const vsrc=findVectorSource();
    if(vsrc){
      map.addLayer({id:"buildings3d",type:"fill-extrusion",source:vsrc,"source-layer":"building",
        minzoom:13.5,
        paint:{
          "fill-extrusion-color":"#2a2c33",
          "fill-extrusion-height":["coalesce",["get","render_height"],["get","height"],12],
          "fill-extrusion-base":["coalesce",["get","render_min_height"],0],
          "fill-extrusion-opacity":["interpolate",["linear"],["zoom"],13.5,0,14.5,0.85]
        }}, firstSymbolLayer());
    }
  }catch(e){ console.warn("buildings",e); }

  initDeck();
  startSim();
  document.getElementById("boot").classList.add("hide");
});
map.on("error",e=>console.warn("map error",e&&e.error));

/* ====================== DECK.GL ОВЕРЛЕЙ ====================== */
let overlay;
function initDeck(){
  overlay = new deck.MapboxOverlay({
    interleaved:true,
    layers:[],
    onClick:info=>{ if(info && info.object && info.object._kind==="obj"){ selectObject(info.object); } }
  });
  map.addControl(overlay);
}

/* ====================== СИМУЛЯЦІЯ ====================== */
let objects=[];        // активні об'єкти
let explosions=[];     // анімації збиття/влучання
let alertSet=new Set();// індекси областей під тривогою
let simTime=0;         // секунди симуляції (= реальний час)
let nextId=1;
let lastReal=performance.now();
const counters={shahed:0,cruise:0,ballistic:0,recon:0,down:0,reached:0};
const sparkBuf=new Array(60).fill(0);
let sparkAcc=0;

const STEPS=46;
function spawn(type){
  const T=TYPES[type];
  const origin=ORIGINS[(Math.random()*ORIGINS.length)|0];
  const city=CITIES[(Math.random()*CITIES.length)|0];
  const dur=rnd(T.dur[0],T.dur[1]);
  const intercepted=Math.random()<T.pkInt;
  const interceptFrac= intercepted ? rnd(.3,.92) : 2;  // >1 = не збито
  const path=[],times=[];
  for(let i=0;i<=STEPS;i++){
    const f=i/STEPS;
    const lng=lerp(origin[0],city.c[0],f);
    const lat=lerp(origin[1],city.c[1],f);
    const alt=T.arc*Math.sin(Math.PI*f);
    path.push([lng,lat,alt]); times.push(simTime+f*dur);
  }
  const kmh=Math.round(rnd(T.kmh[0],T.kmh[1]));
  objects.push({
    _kind:"obj", id:nextId++, type, color:T.color, path, times,
    start:simTime, end:simTime+dur, dur, interceptFrac,
    interceptTime:simTime+interceptFrac*dur,
    city, kmh, status:"flight", head:path[0]
  });
}
function spawnWave(n){ for(let i=0;i<n;i++){ const ks=Object.keys(TYPES); spawn(ks[(Math.random()*ks.length)|0]); } }

function sampleAt(o,time){
  const f=(time-o.start)/o.dur;
  if(f<=0) return o.path[0];
  if(f>=1) return o.path[STEPS];
  const x=f*STEPS, i=x|0, fr=x-i, a=o.path[i], b=o.path[i+1];
  return [lerp(a[0],b[0],fr),lerp(a[1],b[1],fr),lerp(a[2],b[2],fr)];
}

function tick(){
  const now=performance.now();
  let dt=(now-lastReal)/1000; lastReal=now;
  if(dt>0.1) dt=0.1;                 // clamp (фон/лаг)
  simTime+=dt;

  const alive=[];
  for(const o of objects){
    if(o.status==="flight"){
      if(simTime>=o.interceptTime && o.interceptFrac<=1){
        o.status="intercepted"; counters.down++;
        explosions.push({pos:sampleAt(o,o.interceptTime),start:simTime,kind:"int"});
        haptic(18); continue;
      }
      if(simTime>=o.end){
        o.status="reached"; counters.reached++;
        explosions.push({pos:o.path[STEPS],start:simTime,kind:"hit"});
        haptic([12,40,12]); if(state.selectedId===o.id) closeSheet(); continue;
      }
      o.head=sampleAt(o,simTime);
      alive.push(o);
    }
  }
  objects=alive;
  explosions=explosions.filter(e=>simTime-e.start<1.3);

  // оновлення вибраного у sheet
  if(state.selectedId!=null){
    const o=objects.find(x=>x.id===state.selectedId);
    if(o) updateSheet(o);
  }

  // sparkline (раз на секунду)
  sparkAcc+=dt;
  if(sparkAcc>=1){ sparkAcc=0; sparkBuf.push(objects.length); sparkBuf.shift(); drawSpark(); }

  updateDeck();
  updateDash();
  requestAnimationFrame(tick);
}

/* спавн-логіка: автохвилі + прив'язка інтенсивності до к-сті тривог */
function startSim(){
  rollAlerts();
  spawnWave(8);
  setInterval(()=>{ if(objects.length<maxObjects()) spawnWave(1+ (Math.random()*Math.max(1,alertSet.size/4)|0)); }, 2600);
  setInterval(rollAlerts, 14000);
  lastReal=performance.now();
  requestAnimationFrame(tick);
}
function maxObjects(){ return state.lite?55:100; }

/* мок alerts.in.ua: випадкові області під тривогою (адаптер замінюється на живий API) */
function rollAlerts(){
  alertSet.clear();
  const k=2+(Math.random()*5|0);
  while(alertSet.size<k){ alertSet.add((Math.random()*OBLASTS.length)|0); }
}

/* ====================== ШАРИ DECK ====================== */
function filteredObjs(){ return objects.filter(o=>state.typeOn[o.type]); }

function updateDeck(){
  if(!overlay) return;
  const objs=filteredObjs();
  const layers=[];

  // 1) Тривоги по областях (низ)
  if(state.layersOn.alerts){
    const pulse=0.10+0.05*Math.sin(simTime*2.2);
    const aData=[...alertSet].map(i=>OBLASTS[i]);
    layers.push(new deck.ScatterplotLayer({
      id:"alerts", data:aData, getPosition:d=>d.c, getRadius:38000,
      radiusUnits:"meters", filled:true, stroked:true, lineWidthMinPixels:1.2,
      getFillColor:[255,69,58,Math.round(pulse*255)], getLineColor:[255,69,58,160],
      pickable:false, updateTriggers:{getFillColor:pulse}
    }));
  }

  // 2) Планована траєкторія (faint)
  if(state.layersOn.arcs){
    layers.push(new deck.ArcLayer({
      id:"arcs", data:objs, getSourcePosition:o=>o.path[0], getTargetPosition:o=>o.city.c,
      getSourceColor:o=>[...o.color,30], getTargetColor:o=>[...o.color,70],
      getHeight:o=>TYPES[o.type].arc/9000*0.9, getWidth:1.1, pickable:false
    }));
    // 3) Анімований шлейф (Trips)
    layers.push(new deck.TripsLayer({
      id:"trips", data:objs, getPath:o=>o.path, getTimestamps:o=>o.times,
      getColor:o=>o.color, currentTime:simTime, trailLength:trailLen(),
      widthMinPixels:2.6, capRounded:true, jointRounded:true, fadeTrail:true, pickable:false
    }));
  }

  // 4) Голова об'єкта (pickable)
  layers.push(new deck.ScatterplotLayer({
    id:"heads", data:objs, getPosition:o=>o.head,
    getRadius:o=>o.id===state.selectedId?7:4.5, radiusUnits:"pixels",
    radiusMinPixels:3, filled:true, stroked:true, lineWidthMinPixels:1.4,
    getFillColor:o=>o.color, getLineColor:o=>o.id===state.selectedId?[255,255,255,255]:[255,255,255,120],
    pickable:true, autoHighlight:true, highlightColor:[255,255,255,90],
    updateTriggers:{getRadius:state.selectedId,getLineColor:state.selectedId}
  }));

  // 5) Вибухи / влучання
  if(explosions.length){
    layers.push(new deck.ScatterplotLayer({
      id:"booms", data:explosions, getPosition:e=>e.pos,
      getRadius:e=>{const p=(simTime-e.start)/1.3;return (2000+p*16000);}, radiusUnits:"meters",
      filled:true, stroked:false,
      getFillColor:e=>{const p=(simTime-e.start)/1.3; const a=Math.round((1-p)*200);
        return e.kind==="int"?[48,209,88,a]:[255,69,58,a];},
      pickable:false, updateTriggers:{getRadius:simTime,getFillColor:simTime}
    }));
  }

  overlay.setProps({layers});
}
function trailLen(){
  // довжина хвоста ~ типу; компроміс читабельність/FPS
  return state.lite?6:10;
}

/* ====================== UI: дашборд ====================== */
function updateDash(){
  const objs=objects;
  document.getElementById("sFlight").textContent=objs.length;
  document.getElementById("sDown").textContent=counters.down;
  document.getElementById("sHit").textContent=counters.reached;
  // chips per type
  for(const k in TYPES){
    const el=document.getElementById("chip_"+k);
    if(el) el.textContent=objs.filter(o=>o.type===k).length;
  }
}
function buildTypeUI(){
  // chips
  const wrap=document.getElementById("typeChips"); wrap.innerHTML="";
  for(const k in TYPES){
    const c=document.createElement("div"); c.className="chip";
    c.innerHTML=`<span class="sw" style="background:${TYPES[k].rgb}"></span>${TYPES[k][lang]} <b id="chip_${k}" style="color:var(--label)">0</b>`;
    wrap.appendChild(c);
  }
  // filter rows
  const fr=document.getElementById("filterRows"); fr.innerHTML="";
  for(const k in TYPES){
    const r=document.createElement("div"); r.className="row"+(state.typeOn[k]?" on":"");
    r.innerHTML=`<span class="sw" style="background:${TYPES[k].rgb}"></span><span class="nm">${TYPES[k][lang]}</span><span class="tg"></span>`;
    r.onclick=()=>{ state.typeOn[k]=!state.typeOn[k]; r.classList.toggle("on",state.typeOn[k]); haptic(8); };
    fr.appendChild(r);
  }
}
function drawSpark(){
  const cv=document.getElementById("spark");
  const w=cv.clientWidth||300,h=42,dpr=Math.min(window.devicePixelRatio||1,2);
  cv.width=w*dpr; cv.height=h*dpr; const g=cv.getContext("2d"); g.scale(dpr,dpr);
  g.clearRect(0,0,w,h);
  const max=Math.max(10,...sparkBuf);
  g.beginPath();
  sparkBuf.forEach((v,i)=>{const x=i/(sparkBuf.length-1)*w,y=h-4-(v/max)*(h-8); i?g.lineTo(x,y):g.moveTo(x,y);});
  const grad=g.createLinearGradient(0,0,w,0); grad.addColorStop(0,"rgba(10,132,255,.3)");grad.addColorStop(1,"#0A84FF");
  g.strokeStyle=grad; g.lineWidth=2; g.lineJoin="round"; g.stroke();
  g.lineTo(w,h); g.lineTo(0,h); g.closePath();
  g.fillStyle="rgba(10,132,255,.10)"; g.fill();
}

/* ====================== UI: bottom sheet ====================== */
const ICONS={
  drone:`<svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="1.9"><circle cx="12" cy="12" r="3"/><path d="M5 5l3 3M19 5l-3 3M5 19l3-3M19 19l-3-3"/><circle cx="4" cy="4" r="1.6"/><circle cx="20" cy="4" r="1.6"/><circle cx="4" cy="20" r="1.6"/><circle cx="20" cy="20" r="1.6"/></svg>`,
  rocket:`<svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="1.9"><path d="M12 2c3 2 4 6 4 9l-4 4-4-4c0-3 1-7 4-9Z"/><path d="M8 15l-2 5M16 15l2 5M12 11v0"/></svg>`,
  ballistic:`<svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="1.9"><path d="M4 20 20 4M14 4h6v6"/><path d="M4 20l4-1 1-4"/></svg>`,
};
function selectObject(o){
  state.selectedId=o.id; haptic(10);
  const el=document.getElementById("sheet");
  document.getElementById("sheetIcon").style.background=TYPES[o.type].rgb;
  document.getElementById("sheetIcon").innerHTML=ICONS[TYPES[o.type].icon];
  document.getElementById("sheetType").textContent=TYPES[o.type][lang];
  updateSheet(o);
  el.classList.add("show");
}
function updateSheet(o){
  const alt=o.head&&o.head[2]?Math.round(o.head[2]):0;
  const eta=Math.max(0,o.end-simTime);
  document.getElementById("sheetSub").textContent=`#${String(o.id).padStart(3,"0")} · ${lang==="uk"?"ціль":"target"}: ${o.city[lang]}`;
  const st=document.getElementById("sheetStatus");
  st.textContent=t("st_flight"); st.style.background="rgba(255,159,10,.22)"; st.style.color="var(--orange)";
  document.getElementById("mSpeed").innerHTML=`${o.kmh} <small>${lang==="uk"?"км/год":"km/h"}</small>`;
  document.getElementById("mAlt").innerHTML=`${alt.toLocaleString()} <small>${lang==="uk"?"м":"m"}</small>`;
  document.getElementById("mEta").innerHTML=`${Math.floor(eta/60)}:${String(Math.floor(eta%60)).padStart(2,"0")}`;
  document.getElementById("mTarget").textContent=o.city[lang];
}
function closeSheet(){ state.selectedId=null; document.getElementById("sheet").classList.remove("show"); }

// свайп вниз для закриття sheet
(()=>{ const s=document.getElementById("sheet"); let y0=null;
  s.addEventListener("touchstart",e=>{y0=e.touches[0].clientY;},{passive:true});
  s.addEventListener("touchmove",e=>{ if(y0!=null){const d=e.touches[0].clientY-y0; if(d>0)s.style.transform=`translateY(${d}px)`;}},{passive:true});
  s.addEventListener("touchend",e=>{ const d=(e.changedTouches[0].clientY-(y0||0)); s.style.transform=""; if(d>70)closeSheet(); y0=null;},{passive:true});
})();

/* ====================== ДОК / КОНТРОЛІ ====================== */
function closePops(){ document.querySelectorAll(".pop").forEach(p=>p.classList.remove("show"));
  document.getElementById("bLayers").classList.remove("on"); document.getElementById("bFilter").classList.remove("on"); }

document.getElementById("bView").onclick=()=>{
  state.is3D=!state.is3D; haptic(10);
  document.getElementById("lblView").textContent=state.is3D?"3D":"2D";
  map.easeTo({pitch:state.is3D?50:0, bearing:state.is3D?-8:0, duration:600});
};
document.getElementById("bLayers").onclick=e=>{
  e.stopPropagation(); const p=document.getElementById("popLayers"); const open=p.classList.contains("show");
  closePops(); if(!open){ p.classList.add("show"); document.getElementById("bLayers").classList.add("on"); } haptic(8);
};
document.getElementById("bFilter").onclick=e=>{
  e.stopPropagation(); const p=document.getElementById("popFilter"); const open=p.classList.contains("show");
  closePops(); if(!open){ p.classList.add("show"); document.getElementById("bFilter").classList.add("on"); } haptic(8);
};
document.getElementById("bCenter").onclick=()=>{ haptic(10);
  map.fitBounds(UA_BOUNDS,{padding:40,pitch:state.is3D?50:0,bearing:state.is3D?-8:0,duration:700}); };
document.getElementById("bWave").onclick=()=>{ spawnWave(state.lite?6:12); toast(t("wave")); haptic([10,30,10]); };
document.getElementById("bLite").onclick=()=>{
  state.lite=!state.lite; haptic(10);
  document.getElementById("bLite").classList.toggle("on",state.lite);
  document.body.classList.toggle("lite",state.lite);
  if(map.getLayer("buildings3d")) map.setLayoutProperty("buildings3d","visibility",state.lite?"none":"visible");
  if(state.lite && map.getTerrain()) map.setTerrain(null);
  else if(!state.lite && state.layersOn.terrain) map.setTerrain({source:"dem",exaggeration:1.25});
  overlay.setProps({useDevicePixels:state.lite?1:true});
  toast(state.lite?t("liteOn"):t("liteOff"));
};
document.getElementById("bLang").onclick=()=>{
  lang=lang==="uk"?"en":"uk"; document.getElementById("lblLang").textContent=lang==="uk"?"EN":"УК";
  document.documentElement.lang=lang; applyI18n(); haptic(8);
  if(state.selectedId!=null){const o=objects.find(x=>x.id===state.selectedId); if(o){document.getElementById("sheetType").textContent=TYPES[o.type][lang];updateSheet(o);}}
};

// шари toggled
document.querySelectorAll("#popLayers .row").forEach(r=>{
  r.onclick=()=>{ const k=r.getAttribute("data-layer"); state.layersOn[k]=!state.layersOn[k];
    r.classList.toggle("on",state.layersOn[k]); haptic(8);
    if(k==="terrain"){ if(state.layersOn[k]&&!state.lite) map.setTerrain({source:"dem",exaggeration:1.25}); else map.setTerrain(null); }
    if(k==="buildings" && map.getLayer("buildings3d")) map.setLayoutProperty("buildings3d","visibility",state.layersOn[k]?"visible":"none");
  };
});

// дашборд згортання
document.getElementById("dashHead").onclick=()=>{ document.getElementById("dash").classList.toggle("collapsed"); haptic(8); };

// тап по мапі (поза об'єктом) — закрити popover'и
map.on("click",()=>closePops());
document.getElementById("map").addEventListener("touchstart",()=>closePops(),{passive:true});

/* init */
applyI18n();
window.addEventListener("resize",()=>{ if(document.getElementById("spark").clientWidth) drawSpark(); });
</script>
